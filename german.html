<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>German Flashcards — Simple (with DB Editor)</title>
  <style>
    :root{--bg:#0f1724;--card:#0b1220;--accent:#7c3aed;--muted:#9aa4b2;font-family:Inter, system-ui, -apple-system, "Segoe UI", Roboto, "Helvetica Neue", Arial}
    html,body{height:100%;margin:0;background:linear-gradient(180deg,#071026 0%, #0b1b2b 100%);color:#e6eef8}
    .wrap{min-height:100vh;display:flex;align-items:center;justify-content:center;padding:28px}

    /* Card */
    .card{width:420px;height:260px;perspective:1000px}
    .card-inner{width:100%;height:100%;position:relative;transform-style:preserve-3d;transition:transform .6s cubic-bezier(.2,.9,.3,1)}
    .card.is-flipped .card-inner{transform:rotateY(180deg)}

    .face{position:absolute;inset:0;border-radius:12px;padding:18px;display:flex;flex-direction:column;align-items:center;justify-content:center;backface-visibility:hidden;-webkit-backface-visibility:hidden;background:linear-gradient(180deg, rgba(255,255,255,0.02), rgba(255,255,255,0.01));border:1px solid rgba(255,255,255,0.03);box-shadow:0 8px 30px rgba(2,6,23,0.6)}
    .front h2,.back h2{font-size:36px;margin:6px 0}
    .part{font-size:13px;color:var(--muted);margin-bottom:6px}
    .back{transform:rotateY(180deg)}

    .controls{display:flex;gap:10px;margin-top:12px}
    button{background:rgba(255,255,255,0.03);border:0;padding:8px 12px;border-radius:8px;color:inherit;cursor:pointer}
    .primary{background:linear-gradient(90deg,var(--accent),#4f46e5);box-shadow:0 8px 20px rgba(124,58,237,0.12)}

    .toolbar{display:flex;gap:8px;align-items:center;justify-content:center;margin-top:14px}
    .muted{color:var(--muted);font-size:13px}

    /* Editor modal */
    .modal{position:fixed;left:0;top:0;width:100%;height:100%;display:none;align-items:center;justify-content:center;background:rgba(2,6,23,0.7);z-index:999}
    .modal.open{display:flex}
    .modal-dialog{background:#071227;color:var(--muted);width:95%;max-width:1150px;border-radius:10px;padding:16px;border:1px solid rgba(255,255,255,0.03);box-shadow:0 12px 40px rgba(2,6,23,0.7)}

    .editor-controls{display:flex;gap:8px;align-items:center;flex-wrap:wrap;margin-bottom:10px}
    .editor-left{flex:1}
    .editor-actions{display:flex;gap:8px}

    table.editor-table{width:100%;border-collapse:collapse;font-size:13px}
    table.editor-table th, table.editor-table td{padding:6px 8px;border-bottom:1px solid rgba(255,255,255,0.03);color:#e6eef8}
    input.cell{width:100%;padding:6px;border-radius:6px;border:1px solid rgba(255,255,255,0.04);background:rgba(255,255,255,0.01);color:inherit}

    .pager{display:flex;gap:8px;align-items:center;justify-content:center;margin-top:8px}

    .error{color:#ffb4b4;background:#3f1a1a;padding:8px;border-radius:6px;margin-top:8px}

    @media (max-width:480px){.card{width:320px;height:220px}.front h2,.back h2{font-size:28px}}
  </style>
</head>
<body>
  <div class="wrap">
    <div>
      <div style="text-align:center;margin-bottom:12px">
        <h1 style="margin:0;font-size:18px">German Flashcards — Simple</h1>
        <div class="muted">Place <code>german.json</code> beside this file. The deck is shuffled and the first card is random.</div>
      </div>

      <div class="card" id="card" tabindex="0" role="button" aria-pressed="false">
        <div class="card-inner" id="inner">

          <div class="face front">
            <div class="part" id="part-front"></div>
            <h2 id="front-word">Loading…</h2>
            <div class="controls">
              <button id="prev">◀ Prev</button>
              <button id="flip" class="primary">Flip</button>
              <button id="next">Next ▶</button>
            </div>
          </div>

          <div class="face back">
            <div class="part" id="part-back"></div>
            <h2 id="back-word"></h2>
            <div class="controls">
              <button id="again">Again</button>
              <button id="known" class="primary">Known ✓</button>
            </div>
          </div>

        </div>
      </div>

      <div class="toolbar" style="margin-top:14px">
        <button id="shuffle">Shuffle</button>
        <button id="random">Random Card</button>
        <button id="toggleLang">Switch to English</button>
        <div class="muted" id="progress">0 / 0</div>
      </div>

      <div class="toolbar" style="margin-top:8px">
        <div class="muted">
          Möchtest du eine detaillierte Erklärung? Klicke
          <a id="explain-link" href="#" target="_blank">HIER</a>
        </div>
      </div>

      <div style="margin-top:14px;display:flex;gap:8px;align-items:center;justify-content:center;">
        <button id="edit-db" class="primary">Edit DB</button>
        <div class="muted">(Edit entries — fields: <code>de</code> and <code>en</code>)</div>
      </div>

    </div>
  </div>

  <!-- Editor Modal -->
  <div class="modal" id="editorModal" role="dialog" aria-modal="true" aria-hidden="true">
    <div class="modal-dialog">
      <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:8px">
        <h2 style="margin:0">Edit Database (de / en)</h2>
        <div style="display:flex;gap:8px;align-items:center">
          <span class="muted">Page size:</span>
          <select id="pageSize">
            <option value="100">100</option>
            <option value="250">250</option>
            <option value="500" selected>500</option>
          </select>
          <button id="closeEditor">Close</button>
        </div>
      </div>

      <div class="editor-controls">
        <div class="editor-left">
          <input id="filterInput" class="cell" placeholder="Filter (substring search)" />
        </div>
        <div class="editor-actions">
          <button id="downloadJson">Download JSON</button>
          <button id="pushServer">Push to server</button>
          <button id="addNewRow">Add new</button>
        </div>
      </div>

      <div id="errorBox" style="display:none" class="error"></div>

      <div style="overflow:auto;max-height:60vh">
        <table class="editor-table" id="editorTable">
          <thead>
            <tr><th style="width:6%">#</th><th style="width:44%">de</th><th style="width:44%">en</th><th style="width:6%">Del</th></tr>
          </thead>
          <tbody></tbody>
        </table>
      </div>

      <div class="pager" style="margin-top:8px">
        <button id="prevPage">◀ Prev Page</button>
        <div class="muted" id="pageInfo">Page 0 / 0</div>
        <button id="nextPage">Next Page ▶</button>
      </div>

      <div style="display:flex;justify-content:flex-end;margin-top:8px;gap:8px">
        <button id="validateBtn">Validate</button>
        <button id="saveLocal" class="primary">Save (download)</button>
        <button id="saveServer" class="primary">Save & Push to Server</button>
      </div>

    </div>
  </div>

  <script>
  
const $ = id => document.getElementById(id);

// --- Flashcard UI state ---
let deck = [];
let index = 0;
let showEnglishFront = false;

// shuffle
function shuffle(a){
  for(let i=a.length-1;i>0;i--){
    const j = Math.floor(Math.random()*(i+1));
    [a[i],a[j]]=[a[j],a[i]];
  }
}

// --- LOAD DECK (from german.json) ---
async function loadDeck(){
  try{
    const res = await fetch('german.json');
    if(!res.ok) throw new Error('Could not load german.json');

    const data = await res.json();
    deck = Array.isArray(data)
      ? data.filter(x => x && typeof x.de==='string' && typeof x.en==='string')
      : [];

    if(!deck.length) throw new Error('No valid cards found');

    shuffle(deck);
    index = Math.floor(Math.random()*deck.length);
    render();

  }catch(err){
    console.error(err);
    $('front-word').textContent = 'Error';
    $('back-word').textContent = err.message;
    $('progress').textContent = '0 / 0';
  }
}

// render
function render(){
  if(!deck.length) return;

  const card = deck[index];

  if(showEnglishFront){
    $('front-word').textContent = card.en;
    $('back-word').textContent = card.de;
  } else {
    $('front-word').textContent = card.de;
    $('back-word').textContent = card.en;
  }

  $('part-front').textContent = card.part || '';
  $('part-back').textContent = card.part || '';
  $('progress').textContent = `${index+1} / ${deck.length}`;

  $('card').classList.remove('is-flipped');

  // explanation link
  const word = card.de;

const command = `Was bedeutet "${word}"? Wenn es ein Nomen ist, was ist sein Artikel (Der, Das, Die) + Plural? Wenn es ein Verb ist, ist es trennbar und geht mit sein oder haben? Wenn es ein Verb ist, nenne seine 3 Formen: Präsens (3. Person Singular), Präteritum, Partizip II. Überprüfe Wörterbücher wie PONS Deutsch-Bulgarisch, PONS Englisch-Deutsch, Cambridge Dictionary Deutsch-Englisch. Führe 10 Beispiele mit diesem Wort auf.`;

$('explain-link').href =
  `https://www.google.com/search?udm=50&q=${encodeURIComponent(command)}`;
}

// controls
$('flip').onclick = () => $('card').classList.toggle('is-flipped');
$('card').onclick = (e)=>{
  if(e.target.tagName !== 'BUTTON'){
    $('card').classList.toggle('is-flipped');
  }
};

$('next').onclick = ()=>{ index=(index+1)%deck.length; render(); };
$('prev').onclick = ()=>{ index=(index-1+deck.length)%deck.length; render(); };
$('shuffle').onclick = ()=>{ shuffle(deck); index=0; render(); };
$('random').onclick = ()=>{ index=Math.floor(Math.random()*deck.length); render(); };
$('known').onclick = ()=>{ index=(index+1)%deck.length; render(); };
$('again').onclick = ()=>{ index=(index+1)%deck.length; render(); };

// language toggle
$('toggleLang').onclick = ()=>{
  showEnglishFront = !showEnglishFront;
  $('toggleLang').textContent =
    showEnglishFront ? "Switch to German" : "Switch to English";
  render();
};

// keyboard
document.addEventListener('keydown', (e)=>{
  if(e.target.tagName==='INPUT') return;

  if(e.key==='ArrowRight'){ index=(index+1)%deck.length; render(); }
  if(e.key==='ArrowLeft'){ index=(index-1+deck.length)%deck.length; render(); }
  if(e.key===' '){
    e.preventDefault();
    $('card').classList.toggle('is-flipped');
  }
});


// ================= EDITOR =================

let fullDB = [];
let filtered = [];
let currentPage = 0;
let pageSize = 500;

const editorModal = $('editorModal');
const editorTbody = document.querySelector('#editorTable tbody');

// load full DB
async function loadFullDB(){
  const res = await fetch('german.json');
  const data = await res.json();

  fullDB = Array.isArray(data)
    ? data.map(x => ({de: x.de || '', en: x.en || ''}))
    : [];

  applyFilter();
}

// filter + pagination
function applyFilter(){
  const q = $('filterInput').value.toLowerCase();

  filtered = fullDB.filter(r =>
    !q ||
    r.de.toLowerCase().includes(q) ||
    r.en.toLowerCase().includes(q)
  );

  renderEditor();
}

// render editor
function renderEditor(){
  editorTbody.innerHTML = '';

  const start = currentPage * pageSize;
  const end = Math.min(filtered.length, start + pageSize);

  for(let i=start;i<end;i++){
    const row = filtered[i];

    const tr = document.createElement('tr');
    tr.innerHTML = `
      <td>${i+1}</td>
      <td><input data-i="${i}" data-f="de" value="${row.de}"></td>
      <td><input data-i="${i}" data-f="en" value="${row.en}"></td>
      <td><button data-del="${i}">X</button></td>
    `;

    editorTbody.appendChild(tr);
  }

  $('pageInfo').textContent =
    `Showing ${start+1}-${end} of ${filtered.length}`;
}

// open editor
$('edit-db').onclick = async ()=>{
  await loadFullDB();
  editorModal.classList.add('open');
};

// close
$('closeEditor').onclick = ()=>{
  editorModal.classList.remove('open');
};

// filter input
$('filterInput').oninput = ()=>{
  currentPage = 0;
  applyFilter();
};

// edit fields
document.addEventListener('input', (e)=>{
  const i = e.target.dataset.i;
  const f = e.target.dataset.f;

  if(i !== undefined){
    filtered[i][f] = e.target.value;
  }
});

// delete
document.addEventListener('click', (e)=>{
  if(e.target.dataset.del){
    const item = filtered[e.target.dataset.del];
    fullDB.splice(fullDB.indexOf(item),1);
    applyFilter();
  }
});

// add new
$('addNewRow').onclick = ()=>{
  fullDB.push({de:'', en:''});
  applyFilter();
};

// download JSON (SAVE)
function downloadJSON(){
  const blob = new Blob(
    [JSON.stringify(fullDB, null, 2)],
    {type:'application/json'}
  );

  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = 'german.json';
  a.click();
}

// save button
$('saveLocal').onclick = downloadJSON;
$('downloadJson').onclick = downloadJSON;


// init
loadDeck();

  </script>
</body>
</html>
