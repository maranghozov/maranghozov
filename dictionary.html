<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>German-English Dictionary</title>

<style>
:root{
    --bg:#0f1117;
    --card:#1a1d24;
    --accent:#4f8cff;
    --text:#f1f3f5;
    --muted:#9aa4b2;
    --border:#2b3240;
}

*{
    box-sizing:border-box;
}

body{
    margin:0;
    background:var(--bg);
    color:var(--text);
    font-family:Inter,Segoe UI,Arial,sans-serif;
}

.container{
    max-width:1000px;
    margin:auto;
    padding:30px 20px;
}

h1{
    text-align:center;
    margin-bottom:30px;
    font-weight:700;
}

.search-area{
    position:relative;
}

.search-box{
    width:100%;
    padding:18px;
    font-size:18px;
    border:none;
    border-radius:14px;
    background:var(--card);
    color:white;
    outline:none;
}

.search-box:focus{
    box-shadow:0 0 0 2px var(--accent);
}

.controls{
    display:flex;
    gap:12px;
    margin-top:15px;
    flex-wrap:wrap;
}

select{
    background:var(--card);
    color:white;
    border:1px solid var(--border);
    border-radius:10px;
    padding:10px;
    cursor:pointer;
}

button{
    background:var(--accent);
    color:white;
    border:none;
    border-radius:10px;
    padding:10px 18px;
    cursor:pointer;
    font-weight:600;
}

button:hover{
    opacity:.9;
}

#autocomplete{
    position:absolute;
    width:100%;
    background:var(--card);
    border-radius:12px;
    margin-top:6px;
    overflow:hidden;
    z-index:100;
}

.suggestion{
    padding:12px;
    cursor:pointer;
}

.suggestion:hover{
    background:#242937;
}

.info{
    margin-top:20px;
    color:var(--muted);
}

.result{
    background:var(--card);
    border-radius:14px;
    padding:18px;
    margin-top:12px;
    border:1px solid var(--border);
}

.de{
    font-size:18px;
    font-weight:700;
}

.en{
    margin-top:6px;
    color:#cbd5e1;
}

.pagination{
    margin-top:30px;
    display:flex;
    flex-wrap:wrap;
    gap:8px;
}

.page-btn{
    background:var(--card);
    border:1px solid var(--border);
    color:white;
    min-width:40px;
}

.page-btn.active{
    background:var(--accent);
}

.loading{
    text-align:center;
    margin-top:40px;
    color:var(--muted);
}
</style>
</head>

<body>

<div class="container">

<h1>German-English Dictionary</h1>

<div class="search-area">

<input
id="searchInput"
class="search-box"
placeholder="Search..."
autocomplete="off"
>

<div id="autocomplete"></div>

</div>

<div class="controls">

<select id="direction">
<option value="de">German → English</option>
<option value="en">English → German</option>
<option value="both">Both</option>
</select>

<select id="mode">
<option value="exact">Exact</option>
<option value="partial" selected>Partial</option>
<option value="fuzzy">Fuzzy</option>
</select>

<button onclick="performSearch()">Search</button>

</div>

<div id="info" class="info"></div>

<div id="results"></div>

<div id="pagination" class="pagination"></div>

<div id="loading" class="loading">
Loading dictionary...
</div>

</div>

<script>

let dictionary = [];
let currentResults = [];
const RESULTS_PER_PAGE = 50;

async function loadDictionary(){
    try{
        const response = await fetch("german.json");
        dictionary = await response.json();

        document.getElementById("loading").style.display="none";
    }
    catch(error){
        document.getElementById("loading").textContent =
            "Failed to load german.json";
    }
}

loadDictionary();

function levenshtein(a,b){

    const matrix = [];

    for(let i=0;i<=b.length;i++){
        matrix[i]=[i];
    }

    for(let j=0;j<=a.length;j++){
        matrix[0][j]=j;
    }

    for(let i=1;i<=b.length;i++){

        for(let j=1;j<=a.length;j++){

            if(b.charAt(i-1)===a.charAt(j-1)){
                matrix[i][j]=matrix[i-1][j-1];
            }
            else{
                matrix[i][j]=Math.min(
                    matrix[i-1][j-1]+1,
                    matrix[i][j-1]+1,
                    matrix[i-1][j]+1
                );
            }
        }
    }

    return matrix[b.length][a.length];
}

function matches(entry, query, mode, direction){

    const fields = [];

    if(direction==="de"){
        fields.push(entry.de);
    }
    else if(direction==="en"){
        fields.push(entry.en);
    }
    else{
        fields.push(entry.de);
        fields.push(entry.en);
    }

    for(const field of fields){

        const text = field.toLowerCase();

        if(mode==="exact"){
            if(text===query) return true;
        }

        if(mode==="partial"){
            if(text.includes(query)) return true;
        }

        if(mode==="fuzzy"){

            if(text.includes(query)) return true;

            const words = text.split(/\s+/);

            for(const word of words){
                if(levenshtein(word,query)<=2){
                    return true;
                }
            }
        }
    }

    return false;
}

function performSearch(){

    const query =
        document
        .getElementById("searchInput")
        .value
        .trim()
        .toLowerCase();

    if(!query){
        return;
    }

    const direction =
        document.getElementById("direction").value;

    const mode =
        document.getElementById("mode").value;

    const start = performance.now();

    currentResults = dictionary.filter(entry =>
        matches(entry,query,mode,direction)
    );

    const end = performance.now();

    document.getElementById("info").innerHTML =
        `${currentResults.length} matches found · ${(end-start).toFixed(1)} ms`;

    renderPage(1);
}

function renderPage(page){

    const resultsDiv =
        document.getElementById("results");

    resultsDiv.innerHTML = "";

    const start =
        (page-1)*RESULTS_PER_PAGE;

    const pageResults =
        currentResults.slice(
            start,
            start+RESULTS_PER_PAGE
        );

    pageResults.forEach(entry=>{

        const div=document.createElement("div");

        div.className="result";

        div.innerHTML=`
            <div class="de">${entry.de}</div>
            <div class="en">${entry.en}</div>
        `;

        resultsDiv.appendChild(div);
    });

    renderPagination(page);
}

function renderPagination(activePage){

    const totalPages =
        Math.ceil(
            currentResults.length /
            RESULTS_PER_PAGE
        );

    const pagination =
        document.getElementById("pagination");

    pagination.innerHTML="";

    for(let i=1;i<=totalPages;i++){

        const btn =
            document.createElement("button");

        btn.textContent=i;

        btn.className =
            "page-btn" +
            (i===activePage ? " active":"");

        btn.onclick=()=>renderPage(i);

        pagination.appendChild(btn);
    }
}

const searchInput =
    document.getElementById("searchInput");

searchInput.addEventListener("input",()=>{

    const q =
        searchInput.value
        .trim()
        .toLowerCase();

    const box =
        document.getElementById("autocomplete");

    box.innerHTML="";

    if(q.length<2){
        return;
    }

    const suggestions = [];

    for(const entry of dictionary){

        if(
            entry.de.toLowerCase().startsWith(q) ||
            entry.en.toLowerCase().startsWith(q)
        ){
            suggestions.push(entry);

            if(suggestions.length>=8){
                break;
            }
        }
    }

    suggestions.forEach(item=>{

        const div =
            document.createElement("div");

        div.className="suggestion";

        div.textContent =
            `${item.de} → ${item.en}`;

        div.onclick=()=>{

            searchInput.value=item.de;

            box.innerHTML="";

            performSearch();
        };

        box.appendChild(div);
    });
});

searchInput.addEventListener("keydown",e=>{

    if(e.key==="Enter"){
        performSearch();
    }
});

</script>

</body>
